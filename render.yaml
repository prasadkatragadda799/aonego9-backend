databases:
  - name: aonego9-db
    databaseName: aonego9
    plan: free

services:
  - type: web
    name: aonego9-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    branch: main
    # No buildCommand/startCommand — the Dockerfile's ENTRYPOINT
    # (docker/entrypoint.sh) runs migrations, then starts nginx + gunicorn
    # via supervisord. nginx listens on $PORT and reverse-proxies to
    # gunicorn on 127.0.0.1:8000 inside the container.
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aonego9-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: CORS_ORIGINS
        # Comma-separated list of the deployed frontend origins — replace
        # with your actual Vercel/production URLs before going live.
        value: "*"
      - key: ADMIN_EMAIL
        value: admin@aonego9.com
      - key: ADMIN_PASSWORD
        # sync: false keeps this out of render.yaml/git — set the real
        # fixed superadmin password by hand in the Render dashboard
        # (Environment tab). The account is auto-created on first boot
        # with whatever's set here; falls back to "demo1234" if unset.
        sync: false
